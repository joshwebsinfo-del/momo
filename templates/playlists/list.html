{% extends 'base.html' %}
{% block content %}
<div class="card">
  <h2>Relationship Playlist</h2>
  <p><a class="btn" href="{% url 'playlists:create' %}">Add a song</a></p>
</div>
<div class="card-list" style="margin-top: 18px;">
  {% for playlist in playlists %}
  <div class="item-card">
    <h3>{{ playlist.title }} — {{ playlist.artist }}</h3>
    <p>{{ playlist.memory_description }}</p>
    <iframe width="100%" height="220" src="{{ playlist.youtube_url }}" title="YouTube video player" frameborder="0" allowfullscreen></iframe>
  </div>
  {% empty %}
  <div class="card">No songs yet.</div>
  {% endfor %}
</div>
{% endblock %}
