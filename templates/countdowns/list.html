{% extends 'base.html' %}
{% block content %}
<div class="card">
  <h2>Countdowns</h2>
  <p><a class="btn" href="{% url 'countdowns:create' %}">Add a countdown</a></p>
</div>
<div class="card-list" style="margin-top: 18px;">
  {% for countdown in countdowns %}
  <div class="item-card">
    <h3>{{ countdown.title }}</h3>
    <p>{{ countdown.description }}</p>
    <p>{{ countdown.target_date }}</p>
    <a href="{% url 'countdowns:update' countdown.pk %}">Edit</a>
  </div>
  {% empty %}
  <div class="card">No countdowns yet.</div>
  {% endfor %}
</div>
{% endblock %}
