{% extends 'base.html' %}
{% block content %}
<div class="card">
  <h2>Your profile</h2>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn" type="submit">Save</button>
    <a class="btn secondary" href="{% url 'accounts:password_change' %}">Change password</a>
  </form>
</div>
{% endblock %}
