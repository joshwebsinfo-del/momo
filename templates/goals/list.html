{% extends 'base.html' %}
{% block content %}
<div class="card">
  <h2>Goal Tracker</h2>
  <p><a class="btn" href="{% url 'goals:create' %}">Add a goal</a></p>
</div>
<div class="card-list" style="margin-top: 18px;">
  {% for goal in goals %}
  <div class="item-card">
    <h3>{{ goal.title }}</h3>
    <p>{{ goal.description }}</p>
    <div class="progress-bar"><div style="width: {{ goal.percent_complete }}%; background: var(--primary); height: 8px; border-radius: 999px;"></div></div>
    <p>{{ goal.percent_complete }}% complete</p>
  </div>
  {% empty %}
  <div class="card">No goals yet.</div>
  {% endfor %}
</div>
{% endblock %}
